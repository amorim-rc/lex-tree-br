                                { name: "Título III - Embargos à Execução", label: "Título III", subtitle: "Arts. 914 a 920", content: "Defesa do executado." },
                                { name: "Título IV - Suspensão e Extinção", label: "Título IV", subtitle: "Arts. 921 a 925", content: "Pausa e fim da execução." }
                            ]
                        },
                        {
                            name: "Livro III - Processos nos Tribunais", label: "Livro III", subtitle: "Arts. 926 a 1.044",
                            content: "Atuação nas cortes de segunda instância e tribunais superiores.",
                            children: [
                                { name: "Título I - Ordem dos Processos e Competência Originária", label: "Título I", subtitle: "Arts. 926 a 993", content: "Precedentes, ação rescisória, IRDR e assunção de competência." },
                                { name: "Título II - Dos Recursos", label: "Título II", subtitle: "Arts. 994 a 1.044", content: "Apelação, agravo de instrumento, embargos de declaração, REsp, RE, etc." }
                            ]
                        }
                    ]
                },
                {
                    name: "Livro Complementar", label: "Livro Comp.", subtitle: "Arts. 1.045 a 1.072",
                    content: "Disposições Finais e Transitórias do CPC."
                }
            ]
        };

        // ==========================================
        // DADOS: CÓDIGO PENAL
        // ==========================================
        const cpData = {
            name: "Código Penal", label: "CP", subtitle: "Raiz",
            content: "Decreto-Lei nº 2.848/1940. É o principal diploma legal brasileiro para a tipificação de crimes e previsão de penas, estabelecendo os princípios do direito penal no país.",
            children: [
                {
                    name: "Parte Geral", label: "Parte Geral", subtitle: "Arts. 1º a 120",
                    content: "Reúne os princípios gerais do Direito Penal, tratando da aplicação da lei, da teoria do crime, da imputabilidade, das penas e da extinção da punibilidade.",
                    children: [
                        { name: "Título I - Da Aplicação da Lei Penal", label: "Título I", subtitle: "Arts. 1º a 12", content: "Princípio da legalidade, lei penal no tempo e no espaço, extraterritorialidade e eficácia de sentença estrangeira." },
                        { name: "Título II - Do Crime", label: "Título II", subtitle: "Arts. 13 a 25", content: "Relação de causalidade, consumação, tentativa, desistência, arrependimento, erro de tipo/proibição e excludentes de ilicitude (legítima defesa, estado de necessidade)." },
                        { name: "Título III - Da Imputabilidade Penal", label: "Título III", subtitle: "Arts. 26 a 28", content: "Regras sobre doença mental, desenvolvimento mental incompleto, menoridade penal e embriaguez." },
                        { name: "Título IV - Do Concurso de Pessoas", label: "Título IV", subtitle: "Arts. 29 a 31", content: "Regras aplicáveis quando duas ou mais pessoas concorrem para a prática de uma infração penal." },
                        { name: "Título V - Das Penas", label: "Título V", subtitle: "Arts. 32 a 95", content: "Espécies de pena (privativas de liberdade, restritivas de direitos, multa), cominação, aplicação, suspensão condicional e livramento condicional." },
                        { name: "Título VI - Das Medidas de Segurança", label: "Título VI", subtitle: "Arts. 96 a 99", content: "Medidas aplicáveis a inimputáveis ou semi-imputáveis (internação em hospital de custódia e tratamento ambulatorial)." },
                        { name: "Título VII - Da Ação Penal", label: "Título VII", subtitle: "Arts. 100 a 106", content: "Ação penal pública (incondicionada e condicionada) e ação penal de iniciativa privada." },
                        { name: "Título VIII - Extinção da Punibilidade", label: "Título VIII", subtitle: "Arts. 107 a 120", content: "Causas que extinguem o direito de punir do Estado (morte do agente, anistia, prescrição, decadência, perdão)." }
                    ]
                },
                {
                    name: "Parte Especial", label: "Parte Especial", subtitle: "Arts. 121 a 359-U",
                    content: "Tipifica, um a um, os crimes previstos no Brasil, dividindo-os de acordo com o bem jurídico tutelado protegido (vida, patrimônio, honra, etc).",
                    children: [
                        { name: "Título I - Crimes Contra a Pessoa", label: "Título I", subtitle: "Arts. 121 a 154-B", content: "Crimes contra a vida (homicídio, aborto), lesões corporais, periclitação da vida, crimes contra a honra (calúnia, difamação) e contra a liberdade." },
                        { name: "Título II - Crimes Contra o Patrimônio", label: "Título II", subtitle: "Arts. 155 a 183", content: "Furto, roubo, extorsão, apropriação indébita, estelionato, fraudes, receptação e disposições gerais aplicáveis à família." },
                        { name: "Título III - Crimes Contra a Propriedade Imaterial", label: "Título III", subtitle: "Arts. 184 a 196", content: "Violação de direito autoral e crimes contra o privilégio de invenção e marcas." },
                        { name: "Título IV - Crimes Contra a Organização do Trabalho", label: "Título IV", subtitle: "Arts. 197 a 207", content: "Atentado contra a liberdade de trabalho, paralisação, aliciamento de trabalhadores e frustração de direitos trabalhistas." },
                        { name: "Título V - Crimes Contra Sentimento Religioso e Mortos", label: "Título V", subtitle: "Arts. 208 a 212", content: "Vilipêndio a cadáver, destruição de sepultura e impedimento de culto religioso." },
                        { name: "Título VI - Crimes Contra a Dignidade Sexual", label: "Título VI", subtitle: "Arts. 213 a 234-C", content: "Estupro, violação sexual mediante fraude, assédio sexual, estupro de vulnerável e exploração sexual." },
                        { name: "Título VII - Crimes Contra a Família", label: "Título VII", subtitle: "Arts. 235 a 249", content: "Bigamia, ocultação de impedimento, crimes contra o estado de filiação e abandono (material, intelectual ou moral)." },
                        { name: "Título VIII - Crimes Contra a Incolumidade Pública", label: "Título VIII", subtitle: "Arts. 250 a 285", content: "Incêndio, explosão, inundação e crimes contra a saúde pública (falsificação de remédios, epidemia)." },
                        { name: "Título IX - Crimes Contra a Paz Pública", label: "Título IX", subtitle: "Arts. 286 a 288-A", content: "Incitação ao crime, apologia de crime ou criminoso, associação criminosa e constituição de milícia." },
                        { name: "Título X - Crimes Contra a Fé Pública", label: "Título X", subtitle: "Arts. 289 a 311-A", content: "Moeda falsa, falsificação de documentos públicos e particulares, falsidade ideológica e fraudes em certames de interesse público." },
                        { name: "Título XI - Crimes Contra a Administração Pública", label: "Título XI", subtitle: "Arts. 312 a 359-H", content: "Peculato, corrupção (ativa e passiva), concussão, prevaricação, desacato, falso testemunho e crimes contra as finanças públicas." },
                        { name: "Título XII - Crimes Contra o Estado Democrático de Direito", label: "Título XII", subtitle: "Arts. 359-I a 359-U", content: "Atentado à soberania, abolição violenta do Estado Democrático de Direito, golpe de estado e violência política (Incluído em 2021)." }
                    ]
                },
                {
                    name: "Disposições Finais", label: "Disposições F.", subtitle: "Arts. 360 e 361",
                    content: "Regras de encerramento do diploma legal penal e ressalvas em relação à legislação especial vigente."
                }
            ]
        };

        const datasets = {
            'cc': civilCodeData,
            'cpc': cpcData,
            'cp': cpData
        };

        // ==========================================
        // CONFIGURAÇÃO D3.JS (ORIENTAÇÃO VERTICAL)
        // ==========================================
        const container = document.getElementById('tree-container');
        const width = container.clientWidth;
        const height = container.clientHeight;

        let i = 0;
        const duration = 400;
        let root;
        let selectedNode = null;

        const svg = d3.select("#tree-container").append("svg")
            .attr("width", "100%")
            .attr("height", "100%")
            .call(d3.zoom()
                .scaleExtent([0.3, 3])
                .on("zoom", (event) => {
                    svgGroup.attr("transform", event.transform);
                })
            )
            .on("dblclick.zoom", null);

        const svgGroup = svg.append("g");

        // Função para inicializar a árvore com um dataset específico
        function renderTree(dataKey) {
            const data = datasets[dataKey];
            
            // Remove renderizações anteriores
            svgGroup.selectAll("*").remove();
            
            root = d3.hierarchy(data, d => d.children);
            root.x0 = width / 2;
            root.y0 = 0;
            selectedNode = root;

            // Recolhe nós iniciais para visualização limpa
            if(root.children) {
                root.children.forEach(child => {
                    if (child.data.label === "Parte Especial") {
                        collapse(child);
                    } else if (child.children) {
                        child.children.forEach(grandchild => collapse(grandchild));
                    }
                });
            }

            // Reposiciona o zoom inicial para centralizar a raiz no topo
            const initialTransform = d3.zoomIdentity.translate(width / 2, 80).scale(1);
            svg.call(d3.zoom().transform, initialTransform);

            update(root);
            updatePanel(root.data);
        }

        function collapse(d) {
            if (d.children) {
                d._children = d.children;
                d._children.forEach(collapse);
                d.children = null;
            }
        }

        function update(source) {
            // Layout VERTICAL: nodeSize([largura_horizontal, altura_vertical])
            const treeLayout = d3.tree().nodeSize([110, 100]);
            
            treeLayout(root);

            const nodes = root.descendants();
            const links = root.descendants().slice(1);

            // Mapeia posições alvo (agora X é horizontal e Y é vertical)
            nodes.forEach(d => {
                d.targetX = d.x; 
                d.targetY = d.depth * 100;
            });

            // ================= LIGAÇÕES (LINKS) =================
            const link = svgGroup.selectAll("path.link")
                .data(links, d => d.id);

            const linkEnter = link.enter().insert("path", "g")
                .attr("class", "link")
                .attr("d", d => {
                    const o = { targetX: source.x0, targetY: source.y0 };
                    return diagonal(o, o);
                });

            const linkUpdate = linkEnter.merge(link);

            linkUpdate.transition()
                .duration(duration)
                .attr("d", d => diagonal(d.parent, d));

            link.exit().transition()
                .duration(duration)
                .attr("d", d => {
                    const o = { targetX: source.targetX, targetY: source.targetY };
                    return diagonal(o, o);
                })
                .remove();

            // ================= NÓS (NODES) =================
            const node = svgGroup.selectAll("g.node")
                .data(nodes, d => d.id || (d.id = ++i));

            const nodeEnter = node.enter().append("g")
                .attr("class", "node cursor-pointer")
                .attr("transform", d => `translate(${source.x0},${source.y0})`)
                .on("click", click);

            // Retângulo do nó (centralizado no X com x="-45")
            nodeEnter.append("rect")
                .attr("x", -45)
                .attr("y", -16) 
                .attr("width", 90)
                .attr("height", 32)
                .attr("rx", 6) // Bordas levemente menos arredondadas ficam melhores na vertical
                .attr("ry", 6)
                .style("fill", "#fff")
                .style("stroke", "#94a3b8")
                .style("stroke-width", "1.5px")
                .style("box-shadow", "0 4px 6px -1px rgb(0 0 0 / 0.1)");

            // Texto do nó
            nodeEnter.append("text")
                .attr("dy", "0.35em")
                .attr("x", 0) // Centro absoluto graças ao translate e x=-45 no rect
                .attr("text-anchor", "middle")
                .text(d => d.data.label)
                .style("font-size", "11px")
                .style("font-weight", "600")
                .style("fill", "#334155")
                .style("pointer-events", "none");

            const nodeUpdate = nodeEnter.merge(node);

            nodeUpdate.select("rect")
                .transition().duration(duration)
                .style("fill", d => {
                    if (d === selectedNode) return "#0f172a"; 
                    return d._children ? "#e2e8f0" : "#ffffff"; 
                })
                .style("stroke", d => d === selectedNode ? "#0f172a" : "#94a3b8")
                .style("stroke-width", d => d === selectedNode ? "2px" : "1.5px");

            nodeUpdate.select("text")
                .transition().duration(duration)
                .style("fill", d => d === selectedNode ? "#ffffff" : "#475569");

            nodeUpdate.transition()
                .duration(duration)
                .attr("transform", d => `translate(${d.targetX},${d.targetY})`);

            const nodeExit = node.exit().transition()
                .duration(duration)
                .attr("transform", d => `translate(${source.targetX},${source.targetY})`)
                .remove();

            nodeExit.select("rect").attr("width", 0).attr("height", 0).attr("x", 0).attr("y", 0);
            nodeExit.select("text").style("fill-opacity", 0);

            nodes.forEach(d => {
                d.x0 = d.targetX;
                d.y0 = d.targetY;
            });
        }

        // Curva Bezier para orientação VERTICAL
        function diagonal(s, d) {
            // s = source (parent), d = destination (child)
            // O parent tem borda inferior em s.targetY + 16
            // O child tem borda superior em d.targetY - 16
            return `M ${s.targetX} ${s.targetY + 16}
                    C ${s.targetX} ${(s.targetY + 16 + d.targetY - 16) / 2},
                      ${d.targetX} ${(s.targetY + 16 + d.targetY - 16) / 2},
                      ${d.targetX} ${d.targetY - 16}`;
        }

        function click(event, d) {
            selectedNode = d;
            updatePanel(d.data);

            if (d.children) {
                d._children = d.children;
                d.children = null;
            } else {
                d.children = d._children;
                d._children = null;
            }

            update(d);
            
            // Centraliza o foco no eixo Y, mantendo a árvore enquadrada
            const transform = d3.zoomTransform(svg.node());
            const newX = -d.targetX * transform.k + width / 2;
            const newY = -d.targetY * transform.k + height / 3; // Mantém o nó focado a 1/3 do topo
            
            svg.transition().duration(600).call(
                d3.zoom().transform, 
                d3.zoomIdentity.translate(newX, newY).scale(transform.k)
            );
        }

        function updatePanel(data) {
            const panel = document.getElementById('content-panel');
            const title = document.getElementById('node-title');
            const subtitle = document.getElementById('node-subtitle');
            const text = document.getElementById('node-text');

            panel.style.opacity = 0;
            
            setTimeout(() => {
                title.textContent = data.name;
                subtitle.textContent = data.subtitle;
                text.innerHTML = data.content.replace(/\n/g, "<br>");
                panel.style.opacity = 1;
            }, 150);
        }

        // ==========================================
        // EVENT LISTENER DO SELECTOR
        // ==========================================
        document.getElementById('code-selector').addEventListener('change', (e) => {
            renderTree(e.target.value);
        });

        // Inicializa a aplicação com o Código Civil
        renderTree('cc');
        
        // Trata redimensionamento de janela
        window.addEventListener('resize', () => {
            const newWidth = container.clientWidth;
            // Apenas reposiciona se não tivermos navegado muito longe
            if(root && root.x0 === width/2) {
                 root.x0 = newWidth/2;
                 update(root);
            }
        });
    </script>
</body>
